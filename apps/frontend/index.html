
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ngolab Express Kiosk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --kiosk-font-body: 'Manrope', sans-serif;
        --kiosk-font-display: 'Sora', sans-serif;
        --kiosk-bg: #f5f8f3;
        --kiosk-text: #12201b;
        --kiosk-surface: #ffffff;
        --kiosk-primary: #e15b2d;
        --kiosk-primary-strong: #c94821;
        --kiosk-accent: #1d7a63;
        --kiosk-muted: #5f716a;
        --kiosk-border: #d9e2dc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: var(--kiosk-font-body);
        color: var(--kiosk-text);
        background:
          radial-gradient(circle at 10% -10%, rgba(225, 91, 45, 0.2), transparent 40%),
          radial-gradient(circle at 90% 110%, rgba(29, 122, 99, 0.18), transparent 45%),
          linear-gradient(150deg, #f6f7f2, #edf4ed);
        min-height: 100vh;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: var(--kiosk-font-display);
        letter-spacing: -0.02em;
      }

      #root {
        min-height: 100vh;
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #e9efea;
      }
      ::-webkit-scrollbar-thumb {
        background: #98b2a7;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #5e7f72;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      button:focus-visible,
      a:focus-visible,
      input:focus-visible {
        outline: 3px solid rgba(225, 91, 45, 0.4);
        outline-offset: 3px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }

      @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
      }
      .animate-blob {
        animation: blob 7s infinite;
      }
      .animation-delay-2000 {
        animation-delay: 2s;
      }
      .animation-delay-4000 {
        animation-delay: 4s;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
